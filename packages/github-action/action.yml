name: verbatra
description: Run verbatra translations in CI, annotate failures, and write a job summary
author: Mario Kreitz

inputs:
  version:
    description: >-
      The @verbatra/cli version to run, e.g. 1.2.3. PIN this to an exact version for reproducible,
      supply-chain-safe CI; do NOT use a floating tag such as "latest" (it pulls whatever is newest at
      run time, which is non-reproducible and would auto-pull a compromised release). The action
      rejects anything that is not an exact semver (dist-tags, ranges, and ^/~ prefixes all fail the
      step). Required.
    required: true
  config-path:
    description: Explicit config file to load (maps to --config). Empty uses the normal config search.
    required: false
    default: ""
  working-directory:
    description: Directory to resolve config and locale files against (maps to --cwd).
    required: false
    default: ""
  dry-run:
    description: Report what would change without calling a provider or writing (maps to --dry-run).
    required: false
    default: "false"
  node-version:
    description: Node.js version to set up for running the CLI.
    required: false
    default: "24"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    # First rejects a version input that is not an exact semver (no dist-tags, ranges, or ^/~
    # prefixes), which would otherwise let npx silently resolve an unpinned release. Past that guard,
    # captures stdout and exit code without failing the step (a composite step aborts on non-zero,
    # which would skip annotation). Inputs travel via env: as data and bash expands them into a quoted
    # array, so a crafted value stays an argument and is never evaluated as shell.
    - name: Run verbatra translate
      id: run
      shell: bash
      env:
        VERBATRA_VERSION: ${{ inputs.version }}
        CONFIG_PATH: ${{ inputs.config-path }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        DRY_RUN: ${{ inputs.dry-run }}
        SUMMARY_FILE: ${{ runner.temp }}/verbatra-summary.json
        ERROR_FILE: ${{ runner.temp }}/verbatra-error.txt
      run: |
        # The error message below intentionally does not echo $VERBATRA_VERSION: the value is
        # untrusted and a newline in it would forge a second workflow command (e.g.
        # ::stop-commands::) in the Actions log parser. The regex has already determined the value
        # is invalid, so a generic message conveys the same information without ever placing
        # untrusted data on a `::error::` line.
        if ! [[ "$VERBATRA_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
          echo "::error::the version input must be an exact semver version, e.g. 1.2.3 or 1.2.3-next.0. Dist-tags such as 'latest', ranges, and prefixes such as '^' or '~' are not allowed."
          exit 1
        fi
        set +e
        args=(translate --json)
        if [ -n "$CONFIG_PATH" ]; then args+=(--config "$CONFIG_PATH"); fi
        if [ -n "$WORKING_DIRECTORY" ]; then args+=(--cwd "$WORKING_DIRECTORY"); fi
        if [ "$DRY_RUN" = "true" ]; then args+=(--dry-run); fi
        npx --yes "@verbatra/cli@$VERBATRA_VERSION" "${args[@]}" >"$SUMMARY_FILE" 2>"$ERROR_FILE"
        echo "exit_code=$?" >>"$GITHUB_OUTPUT"
        exit 0

    # Exit with the CLI's code so the action fails only after annotations and the summary are emitted.
    - name: Annotate and summarize
      shell: bash
      env:
        SUMMARY_FILE: ${{ runner.temp }}/verbatra-summary.json
        ERROR_FILE: ${{ runner.temp }}/verbatra-error.txt
        EXIT_CODE: ${{ steps.run.outputs.exit_code }}
      run: node "$GITHUB_ACTION_PATH/annotate.mjs" "$SUMMARY_FILE" "$ERROR_FILE" "$EXIT_CODE"
