version: 2

updates:
  # This ecosystem block only sees literal package.json version pins. Most of this repo's
  # dependency surface is pinned through pnpm catalogs in pnpm-workspace.yaml instead, and
  # Dependabot does not read that file, so catalog-pinned packages never get an update proposal
  # here. See the comment above the "catalog" key in pnpm-workspace.yaml for the manual review
  # process that covers that blind spot.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      deepl-logging:
        patterns:
          - "deepl-node"
          - "loglevel"
        update-types:
          - "major"
          - "minor"
          - "patch"
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/packages/github-action"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
