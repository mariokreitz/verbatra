version: 2

updates:
  # Dependabot does parse pnpm-workspace.yaml's catalog entries (pnpm catalog support is
  # GA-announced upstream), but coverage is unreliable in practice: this repo has never
  # received an update proposal for a catalog-pinned package, and dependabot-core has open
  # issues describing catalog entries being left untouched or misclassified. This entry
  # already uses the documented-correct configuration (npm ecosystem, directory "/", the
  # workspace root); there is no local fix. Catalog-pinned packages need periodic manual
  # review instead, see the comment above the "catalog" key in pnpm-workspace.yaml.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      deepl-logging:
        patterns:
          - "deepl-node"
          - "loglevel"
        update-types:
          - "major"
          - "minor"
          - "patch"
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/packages/github-action"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
