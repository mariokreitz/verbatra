name: E2E

# Installs the packed @verbatra/sdk and @verbatra/cli tarballs into a throwaway project
# and drives the real `verbatra` binary. The no-key tier (init, check, diff, export, and
# packaging) runs on every PR and push. The live translate tier runs only nightly and on
# manual dispatch, and only when a provider key is present; otherwise the suite skips it.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Install tarballs and drive the CLI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_PROVIDER: deepl
      DEEPL_API_KEY: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && secrets.DEEPL_API_KEY || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"

      - name: Enable corepack and activate pnpm
        run: corepack enable && corepack prepare pnpm@11.6.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack the published tarballs
        run: |
          mkdir -p "$RUNNER_TEMP/packs"
          pnpm --filter @verbatra/sdk pack --pack-destination "$RUNNER_TEMP/packs"
          pnpm --filter @verbatra/cli pack --pack-destination "$RUNNER_TEMP/packs"
          echo "VERBATRA_SDK_TARBALL=$(ls "$RUNNER_TEMP"/packs/verbatra-sdk-*.tgz)" >> "$GITHUB_ENV"
          echo "VERBATRA_CLI_TARBALL=$(ls "$RUNNER_TEMP"/packs/verbatra-cli-*.tgz)" >> "$GITHUB_ENV"

      - name: Install e2e harness dependencies
        working-directory: e2e
        run: npm install --no-audit --no-fund

      - name: Run E2E suite
        working-directory: e2e
        run: npm test
