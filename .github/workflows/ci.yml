name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    name: Build and test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ["22.14.0", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Enable corepack and activate pnpm
        run: corepack enable && corepack prepare pnpm@11.6.0 --activate

      - name: Compute pnpm store path
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache the pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard against em dash (U+2014)
        run: pnpm check:no-em-dash

      - name: Check (lint and format)
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Guard published declarations (self-contained .d.ts)
        run: pnpm check:dts

      - name: Guard the studio command's bundling (dynamic import, no inlined @verbatra/studio)
        run: pnpm check:studio-bundle

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Typecheck build config files
        run: pnpm typecheck:configs

      - name: Test
        run: pnpm test

      - name: Upload coverage to Codecov
        # Upload from one matrix leg only so coverage is reported once.
        if: ${{ matrix.node == '22.14.0' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: ./packages/*/coverage/lcov.info

  e2e:
    # No-key tier only. It never receives a provider secret, so it is safe to run on
    # pull requests, including from forks. Live provider coverage lives in e2e-live.yml.
    name: Install tarballs and drive the CLI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"

      - name: Enable corepack and activate pnpm
        run: corepack enable && corepack prepare pnpm@11.6.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack the published tarballs
        run: |
          mkdir -p "$RUNNER_TEMP/packs"
          pnpm --filter @verbatra/sdk pack --pack-destination "$RUNNER_TEMP/packs"
          pnpm --filter @verbatra/cli pack --pack-destination "$RUNNER_TEMP/packs"
          echo "VERBATRA_SDK_TARBALL=$(ls "$RUNNER_TEMP"/packs/verbatra-sdk-*.tgz)" >> "$GITHUB_ENV"
          echo "VERBATRA_CLI_TARBALL=$(ls "$RUNNER_TEMP"/packs/verbatra-cli-*.tgz)" >> "$GITHUB_ENV"

      - name: Install e2e harness dependencies
        working-directory: e2e
        run: npm ci --no-audit --no-fund

      - name: Run no-key E2E suite
        working-directory: e2e
        run: npm run test:nokey

  gate:
    # Stable required status check. Aggregates the build-and-test matrix and the e2e
    # job so the branch-protection context stays "Build and test gate" regardless of
    # which Node versions the matrix runs, and release can trust a single CI result.
    name: Build and test gate
    needs: [build-and-test, e2e]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify every matrix leg passed
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "build-and-test matrix did not succeed: ${{ needs.build-and-test.result }}"
            exit 1
          fi

      - name: Verify e2e passed
        run: |
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "e2e did not succeed: ${{ needs.e2e.result }}"
            exit 1
          fi
