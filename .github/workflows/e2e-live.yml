name: E2E (live)

# Live tier: drives translate and watch against a real provider, so it needs GEMINI_API_KEY.
# It never triggers on pull_request, so the secret is only ever exposed to already-merged or
# maintainer-triggered code. The live-e2e environment scopes the secret to this job.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-live:
    name: Drive the CLI against a live provider
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: live-e2e
    env:
      E2E_PROVIDER: gemini
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"

      - name: Enable corepack and activate pnpm
        run: corepack enable && corepack prepare pnpm@11.6.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack the published tarballs
        run: |
          mkdir -p "$RUNNER_TEMP/packs"
          pnpm --filter @verbatra/sdk pack --pack-destination "$RUNNER_TEMP/packs"
          pnpm --filter @verbatra/cli pack --pack-destination "$RUNNER_TEMP/packs"
          echo "VERBATRA_SDK_TARBALL=$(ls "$RUNNER_TEMP"/packs/verbatra-sdk-*.tgz)" >> "$GITHUB_ENV"
          echo "VERBATRA_CLI_TARBALL=$(ls "$RUNNER_TEMP"/packs/verbatra-cli-*.tgz)" >> "$GITHUB_ENV"

      - name: Install e2e harness dependencies
        working-directory: e2e
        run: npm install --no-audit --no-fund

      - name: Run full E2E suite (no-key and live)
        working-directory: e2e
        run: npm test
