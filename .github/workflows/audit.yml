name: Dependency audit

# pnpm audit against the committed lockfile. Production advisories (what ships to users
# of @verbatra/sdk and @verbatra/cli) gate the build; the full audit including dev
# tooling is informational only, so an unfixable transitive dev advisory never red-walls
# CI. Runs weekly so a newly published advisory fails even with no code change.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"

      - name: Enable corepack and activate pnpm
        run: corepack enable && corepack prepare pnpm@11.6.0 --activate

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

      - name: Audit all dependencies (report only)
        if: ${{ always() }}
        run: pnpm audit || true
