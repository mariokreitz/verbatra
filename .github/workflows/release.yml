name: Release

# Release is gated on CI. It does not trigger directly on push to main on purpose.
# A push to main first runs the CI workflow (name: "CI"); only after that CI run
# completes does this workflow fire via the workflow_run event below. The release
# job then runs only when that CI run succeeded for a push to main, and it checks
# out the exact commit CI validated (workflow_run.head_sha), not the moving tip of
# main. A failed or cancelled CI run still creates a Release run, but the job is
# skipped, which is the visible blocked-publish signal in the Actions UI.
# See .verbatra-team/adr/gate-release-on-ci.md (BTS-22).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Gate: proceed only when the triggering CI run succeeded for a push to main.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Pin the exact commit CI validated, not the moving tip of main.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Enable corepack and activate pnpm
        run: corepack enable && corepack prepare pnpm@11.6.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Version Packages PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
          publish: pnpm release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"
