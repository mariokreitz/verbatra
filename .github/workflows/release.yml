name: Release

# Release fires via workflow_run after CI completes (never directly on push) so it only runs against a
# commit CI validated, and splits work into a write-free build pre-flight and a least-privilege publish.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Default to read-only so no step inherits a write scope.
permissions:
  contents: read

jobs:
  build:
    name: Verify build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # Proceed only when the triggering CI run succeeded for a push to main; publish needs: build, so a skip here skips publish too.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Pin the exact commit CI validated, not the moving tip of main.
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"

      - name: Enable corepack and activate pnpm
        run: corepack enable && corepack prepare pnpm@11.6.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Scoped to the publishable packages and their internal deps (turbo pulls in
      # ^build automatically) so this pre-flight never builds apps/docs.
      - name: Build
        run: pnpm turbo run build --filter=@verbatra/sdk --filter=@verbatra/cli

  publish:
    name: Version or publish
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Write scopes live only on this job: contents and pull-requests for the Version Packages PR, id-token for npm OIDC.
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    # Restate the CI gate here so it survives any refactor of the needs edge.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Pin the exact commit CI validated, not the moving tip of main.
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Enable corepack and activate pnpm
        run: corepack enable && corepack prepare pnpm@11.6.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Rebuild here rather than transfer an artifact, so published bytes come from the checkout that publishes them.
      # Scoped to the publishable packages and their internal deps: this job holds id-token: write
      # for npm OIDC, so it must never build apps/docs (Next.js, fetches Google Fonts over the network).
      - name: Build
        run: pnpm turbo run build --filter=@verbatra/sdk --filter=@verbatra/cli

      - name: Create Version Packages PR or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
          publish: pnpm release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"

  verify-publish:
    name: Verify published packages reached npm
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Read-only job: this only runs unauthenticated `npm view` lookups against the public
    # registry, so it gets none of the publish job's write or OIDC scopes.
    permissions:
      contents: read
    # changesets/action can report a green publish step even if only some of the packages it
    # attempted actually reached the registry (e.g. a per-package OIDC Trusted Publisher gap).
    # Re-check its own publishedPackages claim against the live npm registry so a partial publish
    # of a fixed pair like @verbatra/cli and @verbatra/sdk fails the workflow loudly instead of
    # going unnoticed. Restate the CI gate here too, alongside the publish job's own output.
    if: ${{ needs.publish.outputs.published == 'true' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Pin the exact commit CI validated, not the moving tip of main.
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"

      # The script only imports Node built-ins, so run it directly: no pnpm/corepack, no
      # install, keeping this read-only job as small as the permissions it holds.
      - name: Verify published packages reached npm
        run: node scripts/verify-npm-publish.mjs
        env:
          PUBLISHED_PACKAGES_JSON: ${{ needs.publish.outputs.publishedPackages }}
