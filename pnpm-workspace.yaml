packages:
  - "packages/*"
  - "apps/*"

# Single-source duplicated versions. Default catalog holds the shared toolchain, zod, chokidar
# (shared between @verbatra/sdk and @verbatra/studio), and the React runtime (react, react-dom,
# @types/react, @types/react-dom, shared between @verbatra/studio and apps/docs); the "bundled"
# catalog holds the runtime deps that @verbatra/sdk re-declares from the internal packages it
# bundles, so the owning package and sdk always pin the same version.
#
# Dependabot does not reliably update these entries even though pnpm catalog support is
# GA-announced upstream (see the comment in .github/dependabot.yml): dependabot-core has
# multiple open issues describing catalog entries being left untouched, lockfile corruption
# on catalog-sourced updates, and catalog entries being misclassified for dependency-type
# group filters. This is an upstream reliability gap, not a local configuration mistake;
# there is no additional setting here that fixes it. Treat every version below (in either
# "catalog" or "catalogs.bundled") as manually maintained: check the latest with
# `npm view <package> version` (or `npm view <package> versions` for the full release
# history), then bump here and run `pnpm install` to refresh the lockfile. The
# "catalogs.bundled" entries are the highest risk to leave stale, since they ship inside the
# published @verbatra/sdk rather than staying internal to this repo.
catalog:
  "@types/node": 26.0.0
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@vitest/coverage-v8": 4.1.10
  chokidar: 5.0.0
  react: 19.2.7
  react-dom: 19.2.7
  tsup: 8.5.1
  typescript: 6.0.3
  vitest: 4.1.10
  zod: 4.4.3

catalogs:
  bundled:
    "@anthropic-ai/sdk": 0.111.0
    "@formatjs/icu-messageformat-parser": 3.5.11
    "@google/genai": 2.11.0
    "@xmldom/xmldom": 0.9.10
    deepl-node: 1.27.0
    exceljs: 4.4.0
    jszip: 3.10.1
    loglevel: 1.9.2
    openai: 6.46.0
    yaml: 2.9.0

overrides:
  # Force the patched postcss for the vulnerable copy only (next bundles 8.4.31).
  # GHSA-qx2v-qp2m-jg93: XSS via unescaped </style> in CSS stringify output.
  postcss@<8.5.10: ">=8.5.10"
  # GHSA-w5hq-g745-h8pq: missing buffer bounds check in uuid v3/v5/v6 with a buf argument.
  # Vulnerable <11.1.1; lifts the copy exceljs pulls (uuid 8.3.2) on the published sdk/exchange path.
  uuid@<11.1.1: ">=11.1.1"
  # GHSA-h67p-54hq-rp68: quadratic-complexity DoS in js-yaml merge-key handling (dev-only, via @changesets/cli).
  # Vulnerable <3.15.0; lifts the v3 copy (3.14.2) to the patched v3 line (3.15.0). The upper bound is
  # required: read-yaml-file@1.1.0 (used by changesets) calls the v3-only yaml.safeLoad, so an unbounded
  # ">=3.15.0" would resolve v4/v5 and break `changeset version`.
  js-yaml@<3.15.0: ">=3.15.0 <4"
  # GHSA-g7r4-m6w7-qqqr: esbuild dev-server arbitrary file read on Windows (dev-only, via vitest and tsup).
  # Vulnerable >=0.27.3 <0.28.1; lifts the 0.27.7 copy.
  esbuild@<0.28.1: ">=0.28.1"
  # GHSA-xcpc-8h2w-3j85 (CVE-2026-39244): a crafted ZIP uncompressed-size header forces a ~4GB allocation.
  # Vulnerable <0.6.0; lifts the 0.5.17 copy adm-zip is pulled through (deepl-node) to the patched line.
  adm-zip@<0.6.0: ">=0.6.0"
  # GHSA-gcfj-64vw-6mp9 (high, Node adapter reuses an inherited proxy across cloned configs) plus the
  # axios moderate cluster (GHSA-mwf2-3pr3-8698, GHSA-f4gw-2p7v-4548, GHSA-hcpx-6fm6-wx23,
  # GHSA-xj6q-8x83-jv6g and the rest of the 1.15.2-1.17.x line). All patched in 1.18.0; lifts the
  # 1.17.0 copy deepl-node pulls on the published ai-providers/sdk path. deepl-node declares
  # axios ^1.7.4, so the <2 ceiling keeps it inside 1.x (currently 1.18.1).
  axios@<1.18.0: ">=1.18.0 <2"
  # GHSA-j3f2-48v5-ccww: protobufjs DoS via an infinite loop parsing a crafted descriptor.
  # Vulnerable >=7.5.0 <=7.6.4; lifts the 7.6.4 copy @google/genai pulls on the published sdk path.
  # The <8 ceiling is required: @google/genai declares protobufjs ^7.5.4, so an unbounded ">=7.6.5"
  # would resolve the 8.x major (8.7.1) and break it.
  protobufjs@<7.6.5: ">=7.6.5 <8"
  # GHSA-52cp-r559-cp3m (high): quadratic-complexity DoS in js-yaml merge-key handling on the v4 line.
  # Vulnerable >=4.0.0 <4.3.0; lifts the 4.2.0 copy on the published sdk path (via cosmiconfig config
  # loading), and in @commitlint/cli (dev) and fumadocs-mdx (docs). The <5 ceiling keeps it on the v4
  # API those consumers expect.
  "js-yaml@>=4.0.0 <4.3.0": ">=4.3.0 <5"
  # GHSA-724g-mxrg-4qvm: quadratic-complexity DoS in js-yaml via a crafted !!omap on the v5 line.
  # Vulnerable >=5.0.0 <=5.2.0; lifts the 5.2.0 copy fumadocs-core pulls (apps/docs, private).
  "js-yaml@>=5.0.0 <5.2.1": ">=5.2.1 <6"
  # GHSA-3jxr-9vmj-r5cp (high): brace-expansion ReDoS (exponential-time expansion). Both vulnerable
  # majors reach the published sdk/exchange path through exceljs>archiver>...>minimatch. Lift each to
  # its patched release, bounded to its own major.
  brace-expansion@<1.1.16: ">=1.1.16 <2"
  "brace-expansion@>=2.0.0 <2.1.2": ">=2.1.2 <3"
  # GHSA-f88m-g3jw-g9cj (high): sharp inherits libvips vulnerabilities. Vulnerable <0.35.0; lifts the
  # copy next pulls for image optimization (apps/docs only, private, not published to npm).
  sharp@<0.35.0: ">=0.35.0"
  # Next.js highs patched in 16.2.11: App Router middleware/proxy bypass, App Router DoS, Server
  # Actions SSRF, and rewrites SSRF (all >=16.0.0 <16.2.11, apps/docs only, private). The direct pin in
  # apps/docs/package.json is bumped to 16.2.11; this override lifts any transitive fumadocs copy too,
  # bounded to the 16.2 line to avoid an unintended minor jump.
  "next@>=16.0.0 <16.2.11": ">=16.2.11 <16.3"

allowBuilds:
  '@google/genai': false
  '@parcel/watcher': false
  '@swc/core': false
  '@tailwindcss/oxide': true
  esbuild: true
  lefthook: true
  protobufjs: false
  sharp: true
